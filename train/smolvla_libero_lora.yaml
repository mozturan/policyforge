model_name: "lerobot/smolvla_base"
dataset_name: "lerobot/libero_spatial"

lora:
  r: 16
  lora_alpha: 32
  target_modules: ["q_proj", "v_proj", "out_proj"]
  lora_dropout: 0.05

num_epochs: 50
batch_size: 8
learning_rate: 5e-4
warmup_steps: 100
gradient_accumulation_steps: 2
mixed_precision: "bf16"

experiment_name: "smolvla-libero-spatial-lora-r16"
mlflow_tracking_uri: "http://localhost:5000"

